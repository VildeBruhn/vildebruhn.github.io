<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }} | {{ site.title }}</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  <script>
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']]
    }
  };
  </script>

  <script
    id="MathJax-script"
    async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>

<body>

  <div class="page">

    <aside class="sidebar">

      <div class="site-title">
        <a href="{{ '/' | relative_url }}">
          Multivariate analysis with evoTS
        </a>
      </div>

      <nav>

        <a href="{{ '/' | relative_url }}">Start</a>

        <a href="{{ '/schedule/' | relative_url }}">Schedule</a>

        <a href="{{ '/installation/' | relative_url }}">Installation</a>

        <div class="menu-section">

          <a href="{{ '/tutorial/introduction/' | relative_url }}">
            Tutorial
          </a>

          <div class="submenu">
            <a href="{{ '/tutorial/introduction/' | relative_url }}">Introduction</a>
            <a href="{{ '/tutorial/data_import/' | relative_url }}">Data import</a>
            <a href="{{ '/tutorial/multivar_URW/' | relative_url }}">Multivariate unbiased random walk models</a>
            <a href="{{ '/tutorial/multivar_OU/' | relative_url }}">Multivariate Ornstein-Uhlenbeck models</a>
            <a href="{{ '/tutorial/data_description/' | relative_url }}">Data description</a>
          </div>

        </div>

        <a href="{{ '/exercise1/' | relative_url }}">Exercise 1</a>

        <a href="{{ '/exercise2/' | relative_url }}">Exercise 2</a>

        <a href="{{ '/resources/' | relative_url }}">Other Resources</a>

      </nav>

    </aside>

    <main>
      {{ content }}
    </main>

  </div>

  <script>
  document.addEventListener("DOMContentLoaded", () => {

    document.querySelectorAll("pre.highlight").forEach(pre => {

      pre.style.position = "relative";

      const button = document.createElement("button");

      button.className = "copy-button";

      button.innerHTML = `
        <svg xmlns="http://www.w3.org/2000/svg"
             width="18"
             height="18"
             viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">

          <rect x="9" y="9" width="13" height="13" rx="2"></rect>
          <path d="M5 15H4a2 2 0 0 1-2-2V4
                   a2 2 0 0 1 2-2h9
                   a2 2 0 0 1 2 2v1"></path>

        </svg>
      `;

      button.title = "Copy code";

      pre.appendChild(button);

      button.addEventListener("click", async () => {

        const code = pre.querySelector("code").innerText;

        await navigator.clipboard.writeText(code);

        button.style.color = "#6F8452";

        setTimeout(() => {
          button.style.color = "#888";
        }, 1000);

      });

    });

  });
  </script>

</body>

</html>
